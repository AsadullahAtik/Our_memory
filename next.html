<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Neon Love • Our Plans 💖</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Manrope:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-dim": "#12121f",
              "surface-container-lowest": "#0d0d19",
              "surface-bright": "#383846",
              "on-secondary": "#30009b",
              "inverse-surface": "#e3e0f3",
              "tertiary-container": "#63a900",
              "on-secondary-fixed-variant": "#4617cb",
              "on-primary-container": "#5f004a",
              "primary-fixed-dim": "#ffaede",
              "secondary-fixed-dim": "#c9beff",
              "surface-variant": "#343341",
              "tertiary-fixed-dim": "#90da3f",
              "primary-container": "#ff4ecd",
              "on-primary-fixed-variant": "#87006a",
              "surface-tint": "#ffaede",
              primary: "#ffaede",
              "tertiary-fixed": "#abf859",
              "inverse-primary": "#b1008c",
              "inverse-on-surface": "#2f2f3d",
              tertiary: "#90da3f",
              "secondary-container": "#491ccd",
              "surface-container-low": "#1a1a27",
              "surface-container-high": "#292936",
              secondary: "#c9beff",
              surface: "#12121f",
              "on-surface": "#e3e0f3",
              "outline-variant": "#56404d",
              "on-tertiary-container": "#1c3600",
              error: "#ffb4ab",
              "on-primary": "#60004b",
              "primary-fixed": "#ffd8ec",
              "on-tertiary": "#1d3700",
              "error-container": "#93000a",
              "secondary-fixed": "#e6deff",
              "surface-container-highest": "#343341",
              "surface-container": "#1f1e2b",
              "on-primary-fixed": "#3b002d",
              "on-surface-variant": "#dcbecd",
              "on-secondary-fixed": "#1b0062",
              outline: "#a48997",
              "on-error": "#690005",
              "on-tertiary-fixed": "#0e2000",
              "on-error-container": "#ffdad6",
              "on-secondary-container": "#bbaeff",
              "on-tertiary-fixed-variant": "#2c5000",
              "on-background": "#e3e0f3",
              background: "#12121f",
            },
            borderRadius: {
              DEFAULT: "1rem",
              lg: "2rem",
              xl: "3rem",
              full: "9999px",
            },
            fontFamily: {
              headline: ["Noto Serif"],
              body: ["Manrope"],
              label: ["Manrope"],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .glass-panel {
        backdrop-filter: blur(20px);
        background: rgba(18, 18, 31, 0.85);
        border: 1px solid rgba(255, 78, 205, 0.15);
      }
      .neon-border {
        position: absolute;
        inset: 0;
        border-radius: 1.5rem;
        border: 1px solid rgba(255, 78, 205, 0);
        transition: all 0.4s ease;
        pointer-events: none;
      }
      .plan-card:hover .neon-border {
        border-color: rgba(255, 78, 205, 0.6);
        box-shadow: 0 0 40px rgba(255, 78, 205, 0.25);
      }
      .countdown {
        font-variant-numeric: tabular-nums;
      }
      .cursor-ripple {
        position: fixed;
        top: 0;
        left: 0;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        background: radial-gradient(circle, #ff4ecd, #7a5cff);
        box-shadow:
          0 0 10px #ff4ecd,
          0 0 20px #7a5cff,
          0 0 40px #ff4ecd;
        transform: translate(-50%, -50%);
        transition: transform 0.08s ease-out;
      }
      .ripple-click {
        animation: rippleEffect 0.6s ease-out;
      }
      @keyframes rippleEffect {
        0% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(4);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body class="bg-background text-on-surface font-body overflow-x-hidden">
    <!-- Top Navigation Bar -->
    <nav
      class="fixed top-0 w-full z-50 flex justify-between items-center px-10 py-6 bg-[#12121f]/80 backdrop-blur-xl shadow-[0_0_20px_rgba(255,78,205,0.06)]"
    >
      <a
        href="https://asadullahatik.github.io/Our_memory/index.html"
        class="text-2xl font-bold italic text-transparent bg-clip-text bg-gradient-to-r from-[#ff4ecd] to-[#7a5cff] font-headline tracking-tight"
      >
        Our Moments 💖
      </a>
      <div class="hidden md:flex items-center gap-8">
        <a
          href="https://asadullahatik.github.io/Our_memory/index.html"
          class="text-[#e3e0f3]/70 hover:text-[#e3e0f3] transition-colors font-headline tracking-tight"
          >You & Me</a
        >
        <a
          href="https://asadullahatik.github.io/Our_memory/gallery.html"
          class="text-[#e3e0f3]/70 hover:text-[#e3e0f3] transition-colors font-headline tracking-tight"
          >Moments</a
        >
        <a
          href="https://asadullahatik.github.io/Our_memory/story.html"
          class="text-[#e3e0f3]/70 hover:text-[#e3e0f3] transition-colors font-headline tracking-tight"
          >Our Story</a
        >
        <a
          href="https://asadullahatik.github.io/Our_memory/next.html"
          class="text-[#ff4ecd] border-b-2 border-[#ff4ecd] pb-1 font-headline tracking-tight"
          >Neon Love</a
        >
      </div>
      <div class="flex items-center gap-6">
        <button class="hover:bg-[#ff4ecd]/10 p-2 rounded-full transition-all">
          <span class="material-symbols-outlined">favorite</span>
        </button>
        <button class="hover:bg-[#ff4ecd]/10 p-2 rounded-full transition-all">
          <span class="material-symbols-outlined">account_circle</span>
        </button>
      </div>
    </nav>

    <!-- Side Navigation Bar (Same as index.html) -->
    <aside
      class="hidden md:flex fixed left-0 top-0 h-full w-20 hover:w-64 transition-all duration-500 z-40 bg-[#12121f]/90 backdrop-blur-2xl flex-col py-8 shadow-[10px_0_30px_rgba(122,92,255,0.04)] group"
    >
      <div class="flex flex-col items-center gap-12 mt-16 w-full">
        <div
          class="flex flex-col items-center gap-1 w-full px-4 group-hover:items-start group-hover:px-8"
        >
          <div
            class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center mb-2"
          >
            <span class="material-symbols-outlined text-on-secondary-container"
              >auto_awesome</span
            >
          </div>
          <p
            class="hidden group-hover:block font-label uppercase tracking-widest text-[8px] text-[#e3e0f3]/40"
          >
            Our Moments
          </p>
        </div>
        <div class="flex flex-col w-full gap-4">
          <a
            href="https://asadullahatik.github.io/Our_memory/index.html"
            class="flex items-center gap-4 w-full px-6 py-3 text-[#e3e0f3]/40 hover:text-[#ff4ecd] hover:bg-[#7a5cff]/10 transition-all duration-300"
          >
            <span class="material-symbols-outlined">auto_awesome</span>
            <span
              class="hidden group-hover:block font-label uppercase tracking-widest text-[10px]"
              >Home</span
            >
          </a>

          <a
            href="https://asadullahatik.github.io/Our_memory/gallery.html"
            class="flex items-center gap-4 w-full px-6 py-3 text-[#e3e0f3]/40 hover:text-[#ff4ecd] hover:bg-[#7a5cff]/10 transition-all duration-300"
          >
            <span class="material-symbols-outlined">photo_library</span>
            <span
              class="hidden group-hover:block font-label uppercase tracking-widest text-[10px]"
              >Moments</span
            >
          </a>

          <!-- Changed Library to Our Story -->
          <a
            href="https://asadullahatik.github.io/Our_memory/story.html"
            class="flex items-center gap-4 w-full px-6 py-3 text-[#e3e0f3]/40 hover:text-[#ff4ecd] hover:bg-[#7a5cff]/10 transition-all duration-300"
          >
            <span class="material-symbols-outlined">palette</span>
            <span
              class="hidden group-hover:block font-label uppercase tracking-widest text-[10px]"
              >Our Story</span
            >
          </a>

          <div
            class="flex items-center gap-4 w-full px-6 py-3 text-[#ff4ecd] bg-[#ff4ecd]/5 border-r-4 border-[#ff4ecd]"
          >
            <span class="material-symbols-outlined">favorite</span>
            <span
              class="hidden group-hover:block font-label uppercase tracking-widest text-[10px]"
              >Neon Love</span
            >
          </div>
        </div>
      </div>
      <div class="mt-auto px-4 w-full">
        <button
          onclick="openAddModal()"
          class="w-full py-4 rounded-full bg-gradient-to-r from-[#ff4ecd] to-[#7a5cff] text-[#12121f] font-bold text-[10px] uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity duration-300"
        >
          Plan New Date
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main
      class="pl-0 md:pl-20 pt-28 pb-20 px-6 md:px-10 lg:px-16 max-w-7xl mx-auto"
    >
      <div class="text-center mb-16">
        <h1
          class="font-headline text-6xl md:text-7xl font-bold italic tracking-tight mb-4"
        >
          Neon
          <span
            class="text-transparent bg-clip-text bg-gradient-to-r from-[#ff4ecd] to-[#7a5cff]"
            >Love</span
          >
          <span
            class="text-transparent bg-clip-text bg-gradient-to-r from-[#ff4ecd] to-[#7a5cff]"
            >💜</span
          >
        </h1>
        <p class="text-on-surface-variant text-xl italic max-w-md mx-auto">
          Our next beautiful moments together...
        </p>
        <div
          class="w-24 h-px bg-gradient-to-r from-transparent via-[#ff4ecd] to-transparent mx-auto mt-10"
        ></div>
      </div>

      <!-- Add New Plan Button -->
      <div class="flex justify-end mb-8">
        <button
          onclick="openAddModal()"
          class="flex items-center gap-3 bg-gradient-to-r from-[#ff4ecd] to-[#7a5cff] text-[#12121f] font-bold px-8 py-4 rounded-2xl hover:scale-105 transition-all shadow-lg"
        >
          <span class="material-symbols-outlined text-xl">add_circle</span>
          <span class="uppercase tracking-widest text-sm">Plan New Date</span>
        </button>
      </div>

      <!-- Plans Grid -->
      <div
        id="plans-grid"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
      >
        <!-- Plans added by JS -->
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="hidden text-center py-20">
        <span
          class="material-symbols-outlined text-[80px] text-[#ff4ecd]/30 mb-6 block"
          >calendar_today</span
        >
        <p class="text-2xl font-headline italic text-on-surface-variant">
          No plans yet...
        </p>
        <p class="text-on-surface-variant/70 mt-2">
          Create your first Neon Date 💖
        </p>
      </div>
    </main>

    <!-- Add/Edit Plan Modal -->
    <div
      id="plan-modal"
      class="fixed inset-0 bg-black/90 hidden items-center justify-center z-[100]"
    >
      <div class="glass-panel rounded-3xl p-10 w-full max-w-lg mx-4">
        <div class="flex justify-between items-center mb-8">
          <h2 id="modal-title" class="font-headline text-3xl font-bold italic">
            New Neon Date 💖
          </h2>
          <button
            onclick="closeModal()"
            class="text-3xl hover:text-[#ff4ecd] transition-colors"
          >
            ×
          </button>
        </div>

        <div class="space-y-6">
          <div>
            <label
              class="block text-xs font-label uppercase tracking-widest text-on-surface-variant mb-2"
              >Date Title</label
            >
            <input
              id="plan-title"
              type="text"
              placeholder="e.g. Midnight Picnic Under Stars"
              class="w-full bg-[#1f1e2b] border border-[#ff4ecd]/30 rounded-2xl px-6 py-4 focus:outline-none focus:border-[#ff4ecd]"
            />
          </div>

          <div class="grid grid-cols-2 gap-6">
            <div>
              <label
                class="block text-xs font-label uppercase tracking-widest text-on-surface-variant mb-2"
                >Date</label
              >
              <input
                id="plan-date"
                type="date"
                class="w-full bg-[#1f1e2b] border border-[#ff4ecd]/30 rounded-2xl px-6 py-4 focus:outline-none focus:border-[#ff4ecd]"
              />
            </div>
            <div>
              <label
                class="block text-xs font-label uppercase tracking-widest text-on-surface-variant mb-2"
                >Time</label
              >
              <input
                id="plan-time"
                type="time"
                class="w-full bg-[#1f1e2b] border border-[#ff4ecd]/30 rounded-2xl px-6 py-4 focus:outline-none focus:border-[#ff4ecd]"
              />
            </div>
          </div>

          <div>
            <label
              class="block text-xs font-label uppercase tracking-widest text-on-surface-variant mb-2"
              >Location / Note</label
            >
            <textarea
              id="plan-location"
              rows="3"
              placeholder="Rooftop • Park • Cafe • Surprise?"
              class="w-full bg-[#1f1e2b] border border-[#ff4ecd]/30 rounded-3xl px-6 py-4 focus:outline-none focus:border-[#ff4ecd]"
            ></textarea>
          </div>
        </div>

        <div class="flex gap-4 mt-10">
          <button
            onclick="closeModal()"
            class="flex-1 py-4 rounded-2xl border border-[#ff4ecd]/30 hover:bg-[#ff4ecd]/10 transition-colors"
          >
            Cancel
          </button>
          <button
            onclick="savePlan()"
            class="flex-1 py-4 rounded-2xl bg-gradient-to-r from-[#ff4ecd] to-[#7a5cff] text-[#12121f] font-bold uppercase tracking-widest"
          >
            Save This Date ✨
          </button>
        </div>
      </div>
    </div>

    <!-- Ripple Cursor -->
    <div class="cursor-ripple"></div>

    <script>
      let plans = JSON.parse(localStorage.getItem("neonPlans")) || [];

      function renderPlans() {
        const grid = document.getElementById("plans-grid");
        grid.innerHTML = "";

        if (plans.length === 0) {
          document.getElementById("empty-state").classList.remove("hidden");
          return;
        }

        document.getElementById("empty-state").classList.add("hidden");

        plans.forEach((plan, index) => {
          const planDate = new Date(`${plan.date}T${plan.time}`);
          const card = document.createElement("div");
          card.className = `plan-card relative bg-[#1f1e2b] rounded-3xl overflow-hidden group cursor-pointer`;

          const now = new Date();
          let countdownHTML = "";

          if (planDate > now) {
            countdownHTML = `
              <div class="bg-[#12121f]/80 backdrop-blur-xl p-5 text-center border-t border-[#ff4ecd]/20">
                <div class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant mb-1">Countdown</div>
                <div id="countdown-${index}" class="countdown text-2xl font-bold text-[#ff4ecd] tabular-nums"></div>
              </div>
            `;
          } else {
            countdownHTML = `
              <div class="bg-[#12121f]/80 backdrop-blur-xl p-5 text-center border-t border-[#ff4ecd]/20">
                <div class="text-[#90da3f] text-sm font-medium flex items-center justify-center gap-2">
                  <span class="material-symbols-outlined text-lg">check_circle</span>
                  This moment has arrived 💖
                </div>
              </div>
            `;
          }

          card.innerHTML = `
            <div class="p-8 pb-0">
              <div class="flex justify-between items-start mb-6">
                <div>
                  <span class="inline-block px-4 py-1 text-[10px] font-label uppercase tracking-widest bg-[#ff4ecd]/10 text-[#ff4ecd] rounded-full">${plan.date}</span>
                </div>
                <button onclick="deletePlan(${index}); event.stopImmediatePropagation();" 
                        class="opacity-0 group-hover:opacity-100 text-[#ff4ecd]/40 hover:text-[#ff4ecd] transition-colors">
                  <span class="material-symbols-outlined">delete</span>
                </button>
              </div>
              <h3 class="font-headline text-2xl font-bold mb-3 leading-tight">${plan.title}</h3>
              <p class="text-on-surface-variant text-sm line-clamp-2 mb-8">${plan.location || "No location added"}</p>
            </div>
            ${countdownHTML}
            <div class="neon-border"></div>
          `;

          card.addEventListener("click", () => {
            alert(
              `💖 ${plan.title}\n\n📅 ${plan.date} at ${plan.time}\n📍 ${plan.location || "Surprise planned!"}`,
            );
          });

          grid.appendChild(card);

          if (planDate > now) {
            startCountdown(index, planDate);
          }
        });
      }

      function startCountdown(index, targetDate) {
        const el = document.getElementById(`countdown-${index}`);
        if (!el) return;

        const interval = setInterval(() => {
          const now = new Date().getTime();
          const distance = targetDate - now;

          if (distance < 0) {
            clearInterval(interval);
            renderPlans();
            return;
          }

          const days = Math.floor(distance / (1000 * 60 * 60 * 24));
          const hours = Math.floor(
            (distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
          );
          const minutes = Math.floor(
            (distance % (1000 * 60 * 60)) / (1000 * 60),
          );

          el.textContent = `${days}d ${hours.toString().padStart(2, "0")}h ${minutes.toString().padStart(2, "0")}m`;
        }, 60000);
      }

      function openAddModal() {
        document.getElementById("plan-modal").classList.remove("hidden");
        document.getElementById("plan-modal").classList.add("flex");
        document.getElementById("plan-title").value = "";
        document.getElementById("plan-date").value = "";
        document.getElementById("plan-time").value = "";
        document.getElementById("plan-location").value = "";
      }

      function closeModal() {
        const modal = document.getElementById("plan-modal");
        modal.classList.add("hidden");
        modal.classList.remove("flex");
      }

      function savePlan() {
        const title =
          document.getElementById("plan-title").value.trim() || "Neon Date";
        const date = document.getElementById("plan-date").value;
        const time = document.getElementById("plan-time").value;
        const location = document.getElementById("plan-location").value.trim();

        if (!date || !time) {
          alert("Please select date and time 💖");
          return;
        }

        plans.unshift({ title, date, time, location });
        localStorage.setItem("neonPlans", JSON.stringify(plans));
        closeModal();
        renderPlans();
      }

      function deletePlan(index) {
        if (confirm("Delete this plan?")) {
          plans.splice(index, 1);
          localStorage.setItem("neonPlans", JSON.stringify(plans));
          renderPlans();
        }
      }

      // Ripple Cursor
      const cursor = document.querySelector(".cursor-ripple");
      document.addEventListener("mousemove", (e) => {
        cursor.style.top = e.clientY + "px";
        cursor.style.left = e.clientX + "px";
      });
      document.addEventListener("click", () => {
        cursor.classList.add("ripple-click");
        setTimeout(() => cursor.classList.remove("ripple-click"), 600);
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          const modal = document.getElementById("plan-modal");
          if (!modal.classList.contains("hidden")) closeModal();
        }
      });

      // Initial render
      renderPlans();
    </script>
  </body>
</html>
